<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 1280px; height: 720px; font-family: 'Noto Sans SC', sans-serif; background: #fff; }
.ppt-slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
.top-line { width: 100%; height: 4px; background: #c7020e; }
.title-bar { height: 90px; display: flex; align-items: center; padding: 0 50px; border-bottom: 1px solid #e8e8e8; }
.red-bar { width: 4px; height: 30px; background: #c7020e; margin-right: 12px; }
.title { font-size: 32px; font-weight: 700; color: #000; }
.page-num { font-size: 16px; color: #999; margin-left: auto; }
.content { flex: 1; padding: 40px 60px; }
.desc { font-size: 18px; color: #333; line-height: 1.7; margin-bottom: 30px; }
.arch-box { display: flex; gap: 30px; }
.arch-col { flex: 1; }
.arch-title { font-size: 20px; font-weight: 700; color: #c7020e; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #c7020e; }
.arch-item { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 15px 18px; margin-bottom: 12px; }
.arch-item .step { font-size: 13px; color: #c7020e; font-weight: 700; }
.arch-item .text { font-size: 15px; color: #333; margin-top: 4px; line-height: 1.5; }
.big-arrow { text-align: center; font-size: 40px; color: #c7020e; margin: 10px 0; }
.result-box { background: #f0f7ff; border: 1px solid #c7020e; border-radius: 10px; padding: 20px; text-align: center; margin-top: 15px; }
.result-box .r-title { font-size: 18px; font-weight: 700; color: #c7020e; }
.result-box .r-desc { font-size: 14px; color: #555; margin-top: 5px; }
</style>
</head>
<body>
<div class="ppt-slide">
  <div class="top-line"></div>
  <div class="title-bar">
    <div class="red-bar"></div>
    <span class="title">方法总览：AgenTracer 框架</span>
    <span class="page-num">5 / 15</span>
  </div>
  <div class="content">
    <div class="desc">AgenTracer 构建了<strong>自动故障标注流水线</strong> + <strong>多粒度强化学习</strong> 的端到端解决方案</div>
    <div class="arch-box">
      <div class="arch-col">
        <div class="arch-title">① 自动轨迹标注</div>
        <div class="arch-item">
          <div class="step">反事实干预</div>
          <div class="text">对失败轨迹逐步修正并重演，定位问题智能体</div>
        </div>
        <div class="arch-item">
          <div class="step">程序化故障注入</div>
          <div class="text">对成功轨迹注入已知错误，生成标注数据</div>
        </div>
        <div class="big-arrow">⇩</div>
        <div class="arch-item" style="background:#fff5f5;border-color:#c7020e;">
          <div class="step">📦 TracerTraj-2.5K</div>
          <div class="text">2000+ 高质量轨迹-错误对</div>
        </div>
      </div>
      <div class="arch-col">
        <div class="arch-title">② 多粒度强化学习</div>
        <div class="arch-item">
          <div class="step">基础模型</div>
          <div class="text">QWEN3-8B</div>
        </div>
        <div class="arch-item">
          <div class="step">训练算法</div>
          <div class="text">GRPO（Group Relative Policy Optimization）</div>
        </div>
        <div class="big-arrow">⇩</div>
        <div class="arch-item" style="background:#fff5f5;border-color:#c7020e;">
          <div class="step">🤖 AgenTracer-8B</div>
          <div class="text">故障归因专用模型</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

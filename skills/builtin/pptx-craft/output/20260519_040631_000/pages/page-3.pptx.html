<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>背景 - AgenTracer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
    * { font-family: 'Noto Sans SC', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1280px; height: 720px; overflow: hidden; }
  </style>
</head>
<body class="w-[1280px] h-[720px] overflow-hidden bg-white">
  <!-- 顶部装饰线 -->
  <div class="w-full h-[1px] bg-[#c7020e]"></div>
  <!-- 标题栏 -->
  <div class="w-full h-[90px] bg-white border-b border-[#d9d9d9] flex items-center px-8 gap-3">
    <div class="w-[4px] h-[30px] bg-[#c7020e]"></div>
    <span class="text-[35px] font-bold text-black">背景：多智能体系统的脆弱性</span>
    <span class="text-[19px] text-[#8c8c8c] ml-1">Background</span>
    <span class="ml-auto text-[19px] text-[#8c8c8c]">03</span>
  </div>
  <!-- 内容区 -->
  <div class="w-full h-[calc(720px-90px-1px)] bg-white flex flex-col p-8 gap-6">
    <!-- 核心观点卡片 -->
    <div class="bg-[#fff1ef] border border-[#c7020e] p-6">
      <div class="flex items-start gap-4">
        <div class="w-[40px] h-[40px] bg-[#c7020e] flex items-center justify-center flex-shrink-0">
          <span class="text-[22px] text-white font-bold">!</span>
        </div>
        <div>
          <span class="text-[23px] font-bold text-[#c7020e]">核心问题</span>
          <p class="text-[19px] text-black mt-2 leading-relaxed">
            多智能体系统通过<strong class="text-[#c7020e]">多个Agent协作</strong>完成复杂任务，但<strong class="text-[#c7020e]">失败率极高</strong>。一个Agent的小错误可能传播到整个系统，导致整体失败。
          </p>
        </div>
      </div>
    </div>
    <!-- 数据展示 -->
    <div class="flex gap-6 flex-1">
      <div class="flex-1 border border-[#c7020e] bg-white flex flex-col">
        <div class="bg-[#c7020e] py-3 px-5 text-center">
          <span class="text-[19px] font-bold text-white">失败率统计</span>
        </div>
        <div class="p-6 flex flex-col items-center justify-center flex-1 gap-4">
          <div class="text-[48px] font-bold text-[#c7020e]">86.7%</div>
          <div class="text-[19px] text-black/60 text-center">MetaGPT、OpenHands<br>等主流框架失败率</div>
        </div>
      </div>
      <div class="flex-1 border border-[#d9d9d9] bg-white flex flex-col">
        <div class="bg-[#8c8c8c] py-3 px-5 text-center">
          <span class="text-[19px] font-bold text-white">典型案例</span>
        </div>
        <div class="p-6 flex flex-col gap-4">
          <div class="text-[16px] text-[#c7020e] font-bold">AutoGPT</div>
          <div class="text-[19px] text-black">任务链过长，单步失败导致整体崩溃</div>
          <div class="text-[16px] text-[#c7020e] font-bold mt-2">MetaGPT</div>
          <div class="text-[19px] text-black">协作Agent间信息传递错误</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

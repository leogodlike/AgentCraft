<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>目录 - AgenTracer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
    * { font-family: 'Noto Sans SC', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1280px; height: 720px; overflow: hidden; }
  </style>
</head>
<body class="w-[1280px] h-[720px] overflow-hidden bg-white">
  <!-- 顶部装饰线 -->
  <div class="w-full h-[1px] bg-[#c7020e]"></div>
  <!-- 标题栏 -->
  <div class="w-full h-[90px] bg-white border-b border-[#d9d9d9] flex items-center px-8 gap-3">
    <div class="w-[4px] h-[30px] bg-[#c7020e]"></div>
    <span class="text-[35px] font-bold text-black">目录</span>
    <span class="text-[19px] text-[#8c8c8c] ml-1">Contents</span>
    <span class="ml-auto text-[19px] text-[#8c8c8c]">02</span>
  </div>
  <!-- 内容区 -->
  <div class="w-full h-[calc(720px-90px-1px)] bg-white p-12">
    <div class="grid grid-cols-2 gap-6">
      <div class="bg-[#fff1ef] border-l-4 border-[#c7020e] p-5 flex items-center gap-4">
        <div class="w-[28px] h-[28px] bg-[#c7020e] rounded-full flex items-center justify-center text-white text-[14px] font-bold">1</div>
        <span class="text-[21px] font-bold text-black">背景：多智能体系统的脆弱性</span>
      </div>
      <div class="bg-[#f5f5f5] border-l-4 border-[#d9d9d9] p-5 flex items-center gap-4">
        <div class="w-[28px] h-[28px] bg-[#8c8c8c] rounded-full flex items-center justify-center text-white text-[14px] font-bold">2</div>
        <span class="text-[21px] font-bold text-black">核心问题：故障归因</span>
      </div>
      <div class="bg-[#fff1ef] border-l-4 border-[#c7020e] p-5 flex items-center gap-4">
        <div class="w-[28px] h-[28px] bg-[#c7020e] rounded-full flex items-center justify-center text-white text-[14px] font-bold">3</div>
        <span class="text-[21px] font-bold text-black">方法总览</span>
      </div>
      <div class="bg-[#f5f5f5] border-l-4 border-[#d9d9d9] p-5 flex items-center gap-4">
        <div class="w-[28px] h-[28px] bg-[#8c8c8c] rounded-full flex items-center justify-center text-white text-[14px] font-bold">4</div>
        <span class="text-[21px] font-bold text-black">反事实干预与故障注入</span>
      </div>
      <div class="bg-[#fff1ef] border-l-4 border-[#c7020e] p-5 flex items-center gap-4">
        <div class="w-[28px] h-[28px] bg-[#c7020e] rounded-full flex items-center justify-center text-white text-[14px] font-bold">5</div>
        <span class="text-[21px] font-bold text-black">TracerTraj-2.5K 数据集</span>
      </div>
      <div class="bg-[#f5f5f5] border-l-4 border-[#d9d9d9] p-5 flex items-center gap-4">
        <div class="w-[28px] h-[28px] bg-[#8c8c8c] rounded-full flex items-center justify-center text-white text-[14px] font-bold">6</div>
        <span class="text-[21px] font-bold text-black">AgenTracer-8B 训练方案</span>
      </div>
      <div class="bg-[#fff1ef] border-l-4 border-[#c7020e] p-5 flex items-center gap-4">
        <div class="w-[28px] h-[28px] bg-[#c7020e] rounded-full flex items-center justify-center text-white text-[14px] font-bold">7</div>
        <span class="text-[21px] font-bold text-black">实验结果与性能对比</span>
      </div>
      <div class="bg-[#f5f5f5] border-l-4 border-[#d9d9d9] p-5 flex items-center gap-4">
        <div class="w-[28px] h-[28px] bg-[#8c8c8c] rounded-full flex items-center justify-center text-white text-[14px] font-bold">8</div>
        <span class="text-[21px] font-bold text-black">总结与意义</span>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 1280px; height: 720px; font-family: 'Noto Sans SC', sans-serif; background: #fff; }
.ppt-slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
.top-line { width: 100%; height: 4px; background: #c7020e; }
.title-bar { height: 90px; display: flex; align-items: center; padding: 0 50px; border-bottom: 1px solid #e8e8e8; }
.red-bar { width: 4px; height: 30px; background: #c7020e; margin-right: 12px; }
.title { font-size: 32px; font-weight: 700; color: #000; }
.page-num { font-size: 16px; color: #999; margin-left: auto; }
.content { flex: 1; padding: 40px 60px; display: flex; flex-direction: column; }
.question { font-size: 26px; font-weight: 700; color: #c7020e; text-align: center; margin: 30px 0; padding: 20px; background: #fff5f5; border-radius: 12px; }
.sub-q { font-size: 20px; color: #333; text-align: center; margin-bottom: 30px; }
.flow-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; }
.flow-step { background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; padding: 15px 20px; text-align: center; font-size: 14px; color: #333; min-width: 120px; }
.flow-arrow { font-size: 28px; color: #c7020e; font-weight: 700; }
.flow-q { background: #fff0f0; border: 2px dashed #c7020e; border-radius: 8px; padding: 15px 20px; text-align: center; font-size: 14px; color: #c7020e; font-weight: 700; min-width: 120px; }
.bottom-warn { margin-top: auto; background: #fafafa; border-radius: 10px; padding: 20px 30px; text-align: center; border: 1px solid #e8e8e8; }
.bottom-warn .warn-title { font-size: 18px; font-weight: 700; color: #c7020e; margin-bottom: 8px; }
.bottom-warn .warn-desc { font-size: 15px; color: #666; }
</style>
</head>
<body>
<div class="ppt-slide">
  <div class="top-line"></div>
  <div class="title-bar">
    <div class="red-bar"></div>
    <span class="title">核心问题：智能体系统故障归因</span>
    <span class="page-num">4 / 15</span>
  </div>
  <div class="content">
    <div class="question">当系统失败时，究竟<strong>哪个智能体</strong>、<strong>哪一步</strong>出了错？</div>
    <div class="sub-q">→ 这就是 <strong>智能体系统故障归因（Failure Attribution）</strong></div>
    
    <div class="flow-box">
      <div class="flow-step">Agent A<br><span style="font-size:12px;color:#999;">步骤 1-3</span></div>
      <div class="flow-arrow">→</div>
      <div class="flow-step">Agent B<br><span style="font-size:12px;color:#999;">步骤 4-6</span></div>
      <div class="flow-arrow">→</div>
      <div class="flow-q">❓<br>谁出错了？</div>
      <div class="flow-arrow">→</div>
      <div class="flow-step">Agent C<br><span style="font-size:12px;color:#999;">步骤 7-9</span></div>
      <div class="flow-arrow">→</div>
      <div class="flow-step">❌ 失败<br><span style="font-size:12px;color:#999;">步骤 10</span></div>
    </div>

    <div class="bottom-warn">
      <div class="warn-title">⚠️ 现有最强推理模型准确率普遍低于 10%</div>
      <div class="warn-desc">DeepSeek-R1、Gemini-2.5-Pro、Claude-4-Sonnet 在此任务上表现极差</div>
    </div>
  </div>
</div>
</body>
</html>

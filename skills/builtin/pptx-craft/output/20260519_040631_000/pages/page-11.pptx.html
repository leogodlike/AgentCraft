<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 1280px; height: 720px; font-family: 'Noto Sans SC', sans-serif; background: #fff; }
.ppt-slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
.top-line { width: 100%; height: 4px; background: #c7020e; }
.title-bar { height: 90px; display: flex; align-items: center; padding: 0 50px; border-bottom: 1px solid #e8e8e8; }
.red-bar { width: 4px; height: 30px; background: #c7020e; margin-right: 12px; }
.title { font-size: 32px; font-weight: 700; color: #000; }
.page-num { font-size: 16px; color: #999; margin-left: auto; }
.content { flex: 1; padding: 30px 50px; }
.subtitle { font-size: 16px; color: #666; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; font-size: 16px; }
thead th { background: #c7020e; color: #fff; padding: 12px 16px; text-align: center; font-weight: 700; }
thead th:first-child { border-radius: 8px 0 0 0; }
thead th:last-child { border-radius: 0 8px 0 0; }
tbody td { padding: 12px 16px; text-align: center; border-bottom: 1px solid #eee; color: #333; }
tbody td:first-child { font-weight: 700; text-align: left; color: #000; }
tbody tr.winner { background: #fff5f5; }
tbody tr.winner td { font-weight: 700; color: #c7020e; }
tbody tr.winner td:first-child { color: #c7020e; }
.highlight-cell { background: #ffd0d0; border-radius: 4px; padding: 2px 6px; font-weight: 700; color: #c7020e; }
.insight { margin-top: 25px; background: #f0f7ff; border: 1px solid #c7020e; border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.insight .i-icon { font-size: 28px; }
.insight .i-text { font-size: 15px; color: #333; line-height: 1.5; }
.insight .i-text strong { color: #c7020e; }
</style>
</head>
<body>
<div class="ppt-slide">
  <div class="top-line"></div>
  <div class="title-bar">
    <div class="red-bar"></div>
    <span class="title">核心实验结果：Who&When 基准</span>
    <span class="page-num">11 / 15</span>
  </div>
  <div class="content">
    <div class="subtitle">表1: Who&When 基准性能对比 — 多智能体系统故障归因</div>
    <table>
      <thead>
        <tr>
          <th style="text-align:left;">模型</th>
          <th>智能体级准确率</th>
          <th>步骤级准确率</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>DeepSeek-R1</td>
          <td>53.44%</td>
          <td>6.90%</td>
        </tr>
        <tr>
          <td>Gemini-2.5-Pro</td>
          <td>51.72%</td>
          <td>6.90%</td>
        </tr>
        <tr>
          <td>Claude-4-Sonnet</td>
          <td>50.00%</td>
          <td>18.97%</td>
        </tr>
        <tr class="winner">
          <td>🏆 AgenTracer-8B</td>
          <td><span class="highlight-cell">69.10%</span></td>
          <td><span class="highlight-cell">20.68%</span></td>
        </tr>
      </tbody>
    </table>
    <div class="insight">
      <div class="i-icon">🏆</div>
      <div class="i-text"><strong>AgenTracer-8B（8B参数）超越所有千亿级闭源模型</strong> — 超越 Gemini-2.5-Pro 和 Claude-4-Sonnet 最高达 <strong>18.18%</strong></div>
    </div>
  </div>
</div>
</body>
</html>

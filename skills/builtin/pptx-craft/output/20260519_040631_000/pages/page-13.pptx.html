<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 1280px; height: 720px; font-family: 'Noto Sans SC', sans-serif; background: #fff; }
.ppt-slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
.top-line { width: 100%; height: 4px; background: #c7020e; }
.title-bar { height: 90px; display: flex; align-items: center; padding: 0 50px; border-bottom: 1px solid #e8e8e8; }
.red-bar { width: 4px; height: 30px; background: #c7020e; margin-right: 12px; }
.title { font-size: 32px; font-weight: 700; color: #000; }
.page-num { font-size: 16px; color: #999; margin-left: auto; }
.content { flex: 1; padding: 30px 50px; }
.desc { font-size: 17px; color: #333; line-height: 1.6; margin-bottom: 25px; }
.bar-chart { display: flex; flex-direction: column; gap: 18px; margin: 20px 0; }
.bar-row { display: flex; align-items: center; gap: 15px; }
.bar-label { width: 160px; font-size: 16px; font-weight: 700; color: #000; flex-shrink: 0; }
.bar-track { flex: 1; height: 40px; background: #f0f0f0; border-radius: 8px; position: relative; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: flex-end; padding-right: 12px; font-size: 16px; font-weight: 700; color: #fff; }
.bar-fill.b1 { width: 60%; background: linear-gradient(90deg, #c7020e, #e04050); }
.bar-fill.b2 { width: 72%; background: linear-gradient(90deg, #c7020e, #e04050); }
.bar-fill.b3 { width: 85%; background: linear-gradient(90deg, #c7020e, #e04050); }
.bar-val { font-size: 16px; font-weight: 700; color: #c7020e; width: 60px; text-align: right; }
.compare-section { margin-top: 25px; display: flex; gap: 20px; }
.compare-card { flex: 1; background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 18px; text-align: center; }
.compare-card .cc-label { font-size: 13px; color: #888; }
.compare-card .cc-name { font-size: 16px; font-weight: 700; color: #000; margin: 6px 0; }
.compare-card .cc-result { font-size: 14px; color: #c7020e; font-weight: 700; }
.compare-card .cc-bad { font-size: 13px; color: #999; margin-top: 4px; text-decoration: line-through; }
</style>
</head>
<body>
<div class="ppt-slide">
  <div class="top-line"></div>
  <div class="title-bar">
    <div class="red-bar"></div>
    <span class="title">下游性能提升：故障反馈驱动的系统优化</span>
    <span class="page-num">13 / 15</span>
  </div>
  <div class="content">
    <div class="desc">将 <strong>AgenTracer-8B</strong> 的故障归因结果作为反馈，喂给现有多智能体系统，实现<strong>自纠正、自进化</strong></div>

    <div class="bar-chart">
      <div class="bar-row">
        <div class="bar-label">MetaGPT</div>
        <div class="bar-track"><div class="bar-fill b1" style="width:30%;">+4.8%</div></div>
        <div class="bar-val">+4.8%</div>
      </div>
      <div class="bar-row">
        <div class="bar-label">MaAS</div>
        <div class="bar-track"><div class="bar-fill b2" style="width:50%;">+~10%</div></div>
        <div class="bar-val">+~10%</div>
      </div>
      <div class="bar-row">
        <div class="bar-label">OWL Workforce</div>
        <div class="bar-track"><div class="bar-fill b3" style="width:70%;">+14.2%</div></div>
        <div class="bar-val">+14.2%</div>
      </div>
    </div>

    <div class="compare-section">
      <div class="compare-card" style="background:#fff5f5;border-color:#c7020e;">
        <div class="cc-label">🏆 最佳方法</div>
        <div class="cc-name">AgenTracer 故障反馈</div>
        <div class="cc-result">显著优于传统方法</div>
      </div>
      <div class="compare-card">
        <div class="cc-label">传统方法</div>
        <div class="cc-name">Self-Refine</div>
        <div class="cc-result">效果有限</div>
      </div>
      <div class="compare-card">
        <div class="cc-label">传统方法</div>
        <div class="cc-name">CRITIC</div>
        <div class="cc-result">效果有限</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

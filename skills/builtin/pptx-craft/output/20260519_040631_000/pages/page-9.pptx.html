<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 1280px; height: 720px; font-family: 'Noto Sans SC', sans-serif; background: #fff; }
.ppt-slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
.top-line { width: 100%; height: 4px; background: #c7020e; }
.title-bar { height: 90px; display: flex; align-items: center; padding: 0 50px; border-bottom: 1px solid #e8e8e8; }
.red-bar { width: 4px; height: 30px; background: #c7020e; margin-right: 12px; }
.title { font-size: 32px; font-weight: 700; color: #000; }
.page-num { font-size: 16px; color: #999; margin-left: auto; }
.content { flex: 1; padding: 40px 60px; }
.model-card { display: flex; gap: 30px; margin-bottom: 25px; }
.model-base { flex: 1; background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 25px; }
.model-base .mb-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.model-base .mb-name { font-size: 28px; font-weight: 700; color: #000; }
.model-base .mb-desc { font-size: 14px; color: #666; margin-top: 6px; }
.model-algo { flex: 2; background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 25px; }
.model-algo .algo-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.model-algo .algo-name { font-size: 22px; font-weight: 700; color: #c7020e; }
.model-algo .algo-desc { font-size: 14px; color: #555; margin-top: 6px; line-height: 1.5; }
.pipeline { display: flex; align-items: center; gap: 10px; margin: 25px 0; }
.pipe-step { flex: 1; background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; padding: 14px; text-align: center; }
.pipe-step .p-label { font-size: 13px; color: #666; }
.pipe-step .p-value { font-size: 16px; font-weight: 700; color: #333; margin-top: 4px; }
.pipe-step.active { background: #fff5f5; border-color: #c7020e; }
.pipe-step.active .p-label { color: #c7020e; }
.pipe-step.active .p-value { color: #c7020e; }
.pipe-arrow { font-size: 20px; color: #c7020e; }
.dyn-param { background: #f0f7ff; border: 1px solid #c7020e; border-radius: 10px; padding: 15px 20px; }
.dyn-param .dp-title { font-size: 15px; font-weight: 700; color: #c7020e; margin-bottom: 6px; }
.dyn-param .dp-desc { font-size: 14px; color: #555; line-height: 1.5; }
</style>
</head>
<body>
<div class="ppt-slide">
  <div class="top-line"></div>
  <div class="title-bar">
    <div class="red-bar"></div>
    <span class="title">AgenTracer-8B 训练方案</span>
    <span class="page-num">9 / 15</span>
  </div>
  <div class="content">
    <div class="model-card">
      <div class="model-base">
        <div class="mb-title">基础模型</div>
        <div class="mb-name">QWEN3-8B</div>
        <div class="mb-desc">8B 参数，轻量高效</div>
      </div>
      <div class="model-algo">
        <div class="algo-title">训练算法</div>
        <div class="algo-name">GRPO</div>
        <div class="algo-desc">Group Relative Policy Optimization — 多粒度强化学习<br>在组级别进行策略优化，无需 critic 模型</div>
      </div>
    </div>

    <div class="pipeline">
      <div class="pipe-step">
        <div class="p-label">输入</div>
        <div class="p-value">失败轨迹</div>
      </div>
      <div class="pipe-arrow">→</div>
      <div class="pipe-step active">
        <div class="p-label">GRPO 训练</div>
        <div class="p-value">多粒度奖惩</div>
      </div>
      <div class="pipe-arrow">→</div>
      <div class="pipe-step">
        <div class="p-label">输出</div>
        <div class="p-value">故障归因结果</div>
      </div>
    </div>

    <div class="dyn-param">
      <div class="dp-title">⚙️ 动态裁剪参数 B_s</div>
      <div class="dp-desc">训练初期鼓励<strong>广泛探索</strong> → 后期转向<strong>稳定利用</strong>，平衡探索与利用</div>
    </div>
  </div>
</div>
</body>
</html>

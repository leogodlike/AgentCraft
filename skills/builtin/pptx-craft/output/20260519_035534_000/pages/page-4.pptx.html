<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>核心思想与对比 - 什么是机器学习</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
    * { font-family: 'Noto Sans SC', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1280px; height: 720px; overflow: hidden; }
  </style>
</head>
<body class="w-[1280px] h-[720px] overflow-hidden bg-white">
  <!-- 顶部装饰线 -->
  <div class="w-full h-[1px] bg-[#c7020e]"></div>
  
  <!-- 标题栏 -->
  <div class="w-full h-[90px] bg-white border-b border-[#d9d9d9] flex items-center px-8 gap-3">
    <div class="w-[4px] h-[30px] bg-[#c7020e]"></div>
    <span class="text-[35px] font-bold text-black">核心思想与对比</span>
    <span class="text-[19px] text-[#8c8c8c] ml-1">Core Concepts & Comparison</span>
    <span class="ml-auto text-[19px] text-[#8c8c8c]">04</span>
  </div>
  
  <!-- 内容区 -->
  <div class="w-full h-[calc(720px-90px-1px)] bg-white flex flex-col p-8 gap-6">
    <!-- 核心思想 -->
    <div class="bg-[#fff1ef] border border-[#c7020e] p-5">
      <span class="text-[21px] font-bold text-[#c7020e]">🎯 核心思想</span>
      <p class="text-[19px] text-black mt-2 leading-relaxed">
        <strong class="text-[#c7020e]">让计算机通过经验（数据）自动改善性能</strong>，而非每一步都靠人工编写规则。机器学习的本质是从数据中发现规律、提取模式，并利用这些规律对新数据做出预测或决策。
      </p>
    </div>
    
    <!-- 对比表格 -->
    <div class="text-[21px] font-bold text-black">传统编程与机器学习的全面对比</div>
    
    <div class="flex-1 border border-[#d9d9d9]">
      <!-- 表头 -->
      <div class="flex bg-[#c7020e]">
        <div class="w-[200px] py-3 px-4 border-r border-white/20">
          <span class="text-[19px] font-bold text-white">对比维度</span>
        </div>
        <div class="flex-1 py-3 px-4 border-r border-white/20">
          <span class="text-[19px] font-bold text-white">传统编程</span>
        </div>
        <div class="flex-1 py-3 px-4">
          <span class="text-[19px] font-bold text-white">机器学习</span>
        </div>
      </div>
      
      <!-- 数据行1 -->
      <div class="flex border-b border-[#d9d9d9]">
        <div class="w-[200px] py-3 px-4 border-r border-[#d9d9d9] bg-[#f2f2f2]">
          <span class="text-[19px] font-bold text-black">输入方式</span>
        </div>
        <div class="flex-1 py-3 px-4 border-r border-[#d9d9d9]">
          <span class="text-[19px] text-black">数据 + 规则</span>
        </div>
        <div class="flex-1 py-3 px-4">
          <span class="text-[19px] text-black">数据 + 答案</span>
        </div>
      </div>
      
      <!-- 数据行2 -->
      <div class="flex border-b border-[#d9d9d9]">
        <div class="w-[200px] py-3 px-4 border-r border-[#d9d9d9] bg-[#f2f2f2]">
          <span class="text-[19px] font-bold text-black">实现方式</span>
        </div>
        <div class="flex-1 py-3 px-4 border-r border-[#d9d9d9]">
          <span class="text-[19px] text-black">程序员手写每一步逻辑</span>
        </div>
        <div class="flex-1 py-3 px-4">
          <span class="text-[19px] text-black">算法自动发现数据中的模式</span>
        </div>
      </div>
      
      <!-- 数据行3 -->
      <div class="flex border-b border-[#d9d9d9]">
        <div class="w-[200px] py-3 px-4 border-r border-[#d9d9d9] bg-[#f2f2f2]">
          <span class="text-[19px] font-bold text-black">适用场景</span>
        </div>
        <div class="flex-1 py-3 px-4 border-r border-[#d9d9d9]">
          <span class="text-[19px] text-black">规则明确的问题（如计算器）</span>
        </div>
        <div class="flex-1 py-3 px-4">
          <span class="text-[19px] text-black">规则复杂或未知的问题（如图像识别）</span>
        </div>
      </div>
      
      <!-- 数据行4 -->
      <div class="flex">
        <div class="w-[200px] py-3 px-4 border-r border-[#d9d9d9] bg-[#f2f2f2]">
          <span class="text-[19px] font-bold text-black">扩展性</span>
        </div>
        <div class="flex-1 py-3 px-4 border-r border-[#d9d9d9]">
          <span class="text-[19px] text-black">需重写代码适配新场景</span>
        </div>
        <div class="flex-1 py-3 px-4">
          <span class="text-[19px] text-black text-[#c7020e] font-bold">用新数据重新训练即可</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

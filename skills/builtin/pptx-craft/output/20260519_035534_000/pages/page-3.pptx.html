<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>什么是机器学习 - 什么是机器学习</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
    * { font-family: 'Noto Sans SC', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1280px; height: 720px; overflow: hidden; }
  </style>
</head>
<body class="w-[1280px] h-[720px] overflow-hidden bg-white">
  <!-- 顶部装饰线 -->
  <div class="w-full h-[1px] bg-[#c7020e]"></div>
  
  <!-- 标题栏 -->
  <div class="w-full h-[90px] bg-white border-b border-[#d9d9d9] flex items-center px-8 gap-3">
    <div class="w-[4px] h-[30px] bg-[#c7020e]"></div>
    <span class="text-[35px] font-bold text-black">什么是机器学习</span>
    <span class="text-[19px] text-[#8c8c8c] ml-1">What is Machine Learning</span>
    <span class="ml-auto text-[19px] text-[#8c8c8c]">03</span>
  </div>
  
  <!-- 内容区 -->
  <div class="w-full h-[calc(720px-90px-1px)] bg-white flex flex-col p-8 gap-6">
    <!-- 定义卡片 -->
    <div class="bg-[#fff1ef] border border-[#c7020e] p-6">
      <div class="flex items-start gap-4">
        <div class="w-[40px] h-[40px] bg-[#c7020e] flex items-center justify-center flex-shrink-0">
          <span class="text-[22px] text-white font-bold">ML</span>
        </div>
        <div>
          <span class="text-[23px] font-bold text-[#c7020e]">核心定义</span>
          <p class="text-[19px] text-black mt-2 leading-relaxed">
            机器学习是<strong class="text-[#c7020e]">人工智能（AI）的核心分支</strong>，它让计算机<strong class="text-[#c7020e]">不需要被明确编程</strong>就能从数据中学习和改进。简单来说，传统编程是你告诉计算机"怎么做"，而机器学习是你给计算机数据和答案，让它自己找出"怎么做"的规律。
          </p>
        </div>
      </div>
    </div>
    
    <!-- 对比卡片 -->
    <div class="text-[21px] font-bold text-black mb-2">传统编程 vs 机器学习：两种截然不同的范式</div>
    <div class="flex gap-6 flex-1">
      <!-- 传统编程 -->
      <div class="flex-1 border border-[#d9d9d9] bg-white flex flex-col">
        <div class="bg-[#8c8c8c] py-3 px-5 text-center">
          <span class="text-[19px] font-bold text-white">传统编程</span>
        </div>
        <div class="p-5 flex flex-col items-center justify-center flex-1 gap-3">
          <div class="flex items-center gap-2">
            <span class="text-[19px] text-black/70">输入</span>
            <span class="text-[23px] font-bold text-[#c7020e]">数据 + 规则</span>
          </div>
          <div class="text-[28px] text-[#c7020e]">↓</div>
          <span class="text-[19px] font-bold text-black">输出：答案</span>
          <div class="mt-2 text-[16px] text-black/60 text-center">程序员手写每一步逻辑<br>适合规则明确的问题</div>
        </div>
      </div>
      
      <!-- 机器学习 -->
      <div class="flex-1 border border-[#c7020e] bg-white flex flex-col">
        <div class="bg-[#c7020e] py-3 px-5 text-center">
          <span class="text-[19px] font-bold text-white">机器学习</span>
        </div>
        <div class="p-5 flex flex-col items-center justify-center flex-1 gap-3">
          <div class="flex items-center gap-2">
            <span class="text-[19px] text-black/70">输入</span>
            <span class="text-[23px] font-bold text-[#c7020e]">数据 + 答案</span>
          </div>
          <div class="text-[28px] text-[#c7020e]">↓</div>
          <span class="text-[19px] font-bold text-black">输出：规则（模型）</span>
          <div class="mt-2 text-[16px] text-black/60 text-center">算法自动发现数据中的模式<br>适合规则复杂或未知的问题</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>总结 - 什么是机器学习</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
    * { font-family: 'Noto Sans SC', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1280px; height: 720px; overflow: hidden; }
  </style>
</head>
<body class="w-[1280px] h-[720px] overflow-hidden bg-white">
  <!-- 顶部装饰线 -->
  <div class="w-full h-[1px] bg-[#c7020e]"></div>
  
  <!-- 标题栏 -->
  <div class="w-full h-[90px] bg-white border-b border-[#d9d9d9] flex items-center px-8 gap-3">
    <div class="w-[4px] h-[30px] bg-[#c7020e]"></div>
    <span class="text-[35px] font-bold text-black">总结与展望</span>
    <span class="text-[19px] text-[#8c8c8c] ml-1">Summary & Outlook</span>
    <span class="ml-auto text-[19px] text-[#8c8c8c]">08</span>
  </div>
  
  <!-- 内容区 -->
  <div class="w-full h-[calc(720px-90px-1px)] bg-white flex flex-col items-center justify-center p-8">
    <!-- 核心总结 -->
    <div class="bg-[#c7020e] p-8 max-w-[800px] text-center">
      <span class="text-[16px] text-white/70 font-light tracking-[3px]">ONE SENTENCE SUMMARY</span>
      <p class="text-[28px] font-bold text-white mt-4 leading-relaxed">
        机器学习 = 数据 + 算法
      </p>
      <div class="w-[60px] h-[2px] bg-white/40 mx-auto my-4"></div>
      <p class="text-[22px] text-white/90 leading-relaxed">
        让计算机自己学会做决策<br>而不需要人类手写每一条规则
      </p>
    </div>
    
    <!-- 关键要点回顾 -->
    <div class="flex gap-6 mt-8 w-full max-w-[900px]">
      <div class="flex-1 border border-[#d9d9d9] p-4 text-center">
        <span class="text-[23px] font-bold text-[#c7020e]">3</span>
        <p class="text-[16px] text-black/70 mt-1">大学习类型<br>监督·无监督·强化</p>
      </div>
      <div class="flex-1 border border-[#d9d9d9] p-4 text-center">
        <span class="text-[23px] font-bold text-[#c7020e]">6</span>
        <p class="text-[16px] text-black/70 mt-1">步标准化流程<br>从数据到部署</p>
      </div>
      <div class="flex-1 border border-[#d9d9d9] p-4 text-center">
        <span class="text-[23px] font-bold text-[#c7020e]">N</span>
        <p class="text-[16px] text-black/70 mt-1">种应用场景<br>遍及日常生活</p>
      </div>
    </div>
    
    <!-- 展望 -->
    <div class="mt-6 text-[16px] text-black/60 text-center max-w-[700px]">
      随着大模型、多模态技术的快速发展，机器学习正在向<strong class="text-[#c7020e]">通用人工智能（AGI）</strong>迈进，未来将在更多领域释放价值。
    </div>
    
    <!-- 底部 -->
    <div class="mt-6 text-[19px] text-black/40 tracking-[4px]">
      THANK YOU · 感谢聆听
    </div>
  </div>
</body>
</html>
